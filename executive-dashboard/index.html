<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Executive Weekly Briefing — AI Operations</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f4f8; color: #1a1a1a; min-height: 100vh; }
  .header { background: #1e3a5f; color: #fff; padding: 22px 36px; display: flex; align-items: center; justify-content: space-between; }
  .header-left h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: .5px; }
  .header-left p  { font-size: .85rem; color: #90b4d8; margin-top: 3px; }
  .header-right   { text-align: right; font-size: .82rem; color: #90b4d8; line-height: 1.6; }
  .header-right strong { color: #fff; font-size: .9rem; }
  .filter-bar { background: #fff; border-bottom: 1px solid #e0e8f0; padding: 12px 36px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .filter-bar .filter-label { font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: #666; margin-right: 4px; }
  .filter-btn { font-size: .73rem; font-weight: 700; padding: 5px 14px; border-radius: 20px; border: 2px solid transparent; cursor: pointer; text-transform: uppercase; letter-spacing: .4px; transition: all .18s ease; background: #f0f4f8; color: #555; }
  .filter-btn:hover { transform: translateY(-1px); box-shadow: 0 2px 6px rgba(0,0,0,.1); }
  .filter-btn.active { color: #fff; }
  .filter-btn[data-filter="all"].active    { background: #1e3a5f; border-color: #1e3a5f; }
  .filter-btn[data-filter="high"].active   { background: #c0392b; border-color: #c0392b; }
  .filter-btn[data-filter="blocker"].active{ background: #c0392b; border-color: #c0392b; }
  .filter-btn[data-filter="med"].active    { background: #d35400; border-color: #d35400; }
  .filter-btn[data-filter="approved"].active{ background: #2e75b6; border-color: #2e75b6; }
  .filter-btn[data-filter="action"].active { background: #7d3c98; border-color: #7d3c98; }
  .filter-btn[data-filter="low"].active    { background: #27ae60; border-color: #27ae60; }
  .filter-count { margin-left: auto; font-size: .78rem; color: #888; font-style: italic; }
  .kpi-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; padding: 24px 36px 0; }
  .kpi { background: #fff; border-radius: 8px; padding: 18px 22px; border-left: 4px solid #2e75b6; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
  .kpi.green { border-color: #27ae60; }
  .kpi.amber { border-color: #e67e22; }
  .kpi .label { font-size: .72rem; text-transform: uppercase; letter-spacing: .7px; color: #666; margin-bottom: 6px; }
  .kpi .value { font-size: 1.9rem; font-weight: 700; color: #1e3a5f; line-height: 1; }
  .kpi .sub   { font-size: .78rem; color: #888; margin-top: 4px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px 36px 36px; }
  .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.07); overflow: hidden; transition: box-shadow .2s; }
  .card:hover { box-shadow: 0 3px 12px rgba(0,0,0,.1); }
  .card-header { padding: 14px 20px; font-size: .78rem; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: #fff; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
  .card-header .header-left-group { display: flex; align-items: center; gap: 8px; }
  .card-header.blue   { background: #2e75b6; }
  .card-header.green  { background: #27ae60; }
  .card-header.purple { background: #7d3c98; }
  .card-header.amber  { background: #d35400; }
  .chevron { font-size: .9rem; transition: transform .25s ease; }
  .card.collapsed .chevron { transform: rotate(-90deg); }
  .card-body { overflow: hidden; transition: max-height .3s ease, opacity .25s ease; max-height: 600px; opacity: 1; }
  .card.collapsed .card-body { max-height: 0; opacity: 0; }
  .item-count { font-size: .7rem; background: rgba(255,255,255,.25); padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .item { display: flex; align-items: flex-start; gap: 12px; padding: 13px 20px; border-bottom: 1px solid #f0f0f0; font-size: .86rem; line-height: 1.45; transition: background .15s; }
  .item:last-child { border-bottom: none; }
  .item:hover { background: #f8fbff; }
  .item.hidden { display: none; }
  .dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
  .dot.blue   { background: #2e75b6; }
  .dot.green  { background: #27ae60; }
  .dot.purple { background: #7d3c98; }
  .dot.amber  { background: #d35400; }
  .dot.red    { background: #c0392b; }
  .item .content { flex: 1; }
  .item .content .title { font-weight: 600; color: #1e3a5f; }
  .item .content .meta  { color: #888; font-size: .78rem; margin-top: 2px; }
  .badge { font-size: .68rem; font-weight: 700; padding: 3px 10px; border-radius: 10px; text-transform: uppercase; letter-spacing: .4px; white-space: nowrap; flex-shrink: 0; align-self: center; cursor: pointer; transition: transform .15s, box-shadow .15s; border: 1px solid transparent; }
  .badge:hover { transform: translateY(-1px); box-shadow: 0 2px 6px rgba(0,0,0,.15); }
  .badge.high     { background: #fdecea; color: #c0392b; border-color: #f5c6c2; }
  .badge.med      { background: #fef5e7; color: #d35400; border-color: #f5ddb0; }
  .badge.low      { background: #eafaf1; color: #27ae60; border-color: #b0e8c4; }
  .badge.done     { background: #eaf0fb; color: #2e75b6; border-color: #b8d0ef; }
  .badge.action   { background: #f5eef8; color: #7d3c98; border-color: #d5b8e8; }
  .badge.blocker  { background: #fdecea; color: #c0392b; border-color: #f5c6c2; }
